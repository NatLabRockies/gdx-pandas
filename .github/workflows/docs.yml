name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to backfill docs for (e.g. v1.4.0). Leave blank for a normal main -> /latest/ build."
        required: false
        default: ''
      delete_version:
        description: "Versioned subdir to delete (e.g. v1.4.0). Mutually exclusive with `version`."
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target action
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "action=build"   >> "$GITHUB_OUTPUT"
            echo "version=latest" >> "$GITHUB_OUTPUT"
            echo "src_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            v="${{ inputs.version }}"
            d="${{ inputs.delete_version }}"
            if [[ -n "$v" && -n "$d" ]]; then
              echo "::error::Set either 'version' or 'delete_version', not both."
              exit 1
            fi
            if [[ -z "$v" && -z "$d" ]]; then
              echo "::error::workflow_dispatch requires 'version' or 'delete_version'."
              exit 1
            fi
            if [[ -n "$v" ]]; then
              echo "action=build"  >> "$GITHUB_OUTPUT"
              echo "version=$v"    >> "$GITHUB_OUTPUT"
              echo "src_ref=$v"    >> "$GITHUB_OUTPUT"
            else
              echo "action=delete" >> "$GITHUB_OUTPUT"
              echo "version=$d"    >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout source
        if: steps.target.outputs.action == 'build'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.src_ref }}

      - name: Set up Python
        if: steps.target.outputs.action == 'build'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install docs deps
        if: steps.target.outputs.action == 'build'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build Sphinx (warnings-as-errors)
        if: steps.target.outputs.action == 'build'
        working-directory: doc
        run: sphinx-build -W --keep-going -b html source build/html

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Apply change to gh-pages tree
        shell: bash
        env:
          VERSION: ${{ steps.target.outputs.version }}
          ACTION:  ${{ steps.target.outputs.action }}
        run: |
          set -euo pipefail
          cd gh-pages

          # First-time migration cleanup: scrub any flat-layout leftovers at the gh-pages root.
          # Keep: git metadata, jekyll-disable marker, root redirect, versions list,
          # per-version subdirs, and CNAME (in case a custom domain is ever configured).
          shopt -s extglob nullglob dotglob
          for entry in *; do
            case "$entry" in
              .git|.nojekyll|CNAME|index.html|versions.json|latest|v[0-9]*) ;;
              *) git rm -rf --quiet "$entry" 2>/dev/null || rm -rf "$entry" ;;
            esac
          done
          shopt -u extglob nullglob dotglob

          if [[ "$ACTION" == "delete" ]]; then
            if [[ -d "$VERSION" ]]; then
              git rm -r "$VERSION"
            else
              echo "::warning::$VERSION not present in gh-pages; nothing to delete."
            fi
          else
            rm -rf "$VERSION"
            mkdir -p "$VERSION"
            cp -r ../doc/build/html/. "$VERSION/"
            git add "$VERSION"
          fi

          # Regenerate versions.json: latest first, then tags newest-first by sort order.
          python3 - <<'PY'
          import json, os, re
          here = os.getcwd()
          subdirs = [d for d in os.listdir(here)
                     if os.path.isdir(d) and (d == 'latest' or re.match(r'^v[0-9]', d))]
          tags = sorted((d for d in subdirs if d != 'latest'), reverse=True)
          out = (['latest'] if 'latest' in subdirs else []) + tags
          with open('versions.json', 'w') as f:
              json.dump(out, f)
          PY

          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=./latest/">
          HTML
          touch .nojekyll
          git add versions.json index.html .nojekyll

      - name: Commit and push
        working-directory: gh-pages
        shell: bash
        env:
          ACTION:  ${{ steps.target.outputs.action }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No changes; skipping push."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: $ACTION $VERSION (source $GITHUB_SHA)"
          git push origin gh-pages
